<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Craftopedia</title>
</head>
<body>
    <h1>Welcome to Craftopedia</h1>
    <input type="text" id="search-input" placeholder="Search...">
    <button onclick="search()">Search</button>
    <div id="search-feedback"></div>
    <script>
        function search() {
            const input = document.getElementById('search-input').value;
            // Some search logic here
            if (input === '') {
                document.getElementById('search-feedback').innerHTML = "<span style='color:red'>Please enter a search term.</span>";
            } else if (input === 'Rose' || input === 'Radhe Radhe') {
                document.getElementById('search-feedback').innerHTML = "<span style='color:green'>You found a match!</span>";
            } else {
                document.getElementById('search-feedback').innerHTML = "<span style='color:red'>Try 'Rose' or 'Draw'</span>";
            }
        }
    </script>
</body>
</html>
