<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Craftopedia | Home</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
/* --- Theme Variables --- */
:root {
    --bg-color: #fdfdfd;
    --card-bg: #ffffff;
    --text-main: #1e293b; 
    --text-sub: #475569;
    --header-bg: #ffffff;
    --accent-pink: #ff6f91;
    --border-color: #cbd5e1;
    --shadow: rgba(0,0,0,0.08);
    --glow: rgba(255, 111, 145, 0.3);
    --hero-grad: linear-gradient(135deg, #fde2e4 0%, #e0f7fa 100%);
}

[data-theme="dark"] {
    --bg-color: #0f172a; 
    --card-bg: #1e293b; 
    --text-main: #f8fafc; 
    --text-sub: #cbd5e1; 
    --header-bg: #1e293b;
    --border-color: #334155;
    --shadow: rgba(0,0,0,0.4);
    --glow: rgba(255, 111, 145, 0.6); 
    --hero-grad: linear-gradient(135deg, #1e1b4b 0%, #0f172a 100%);
}

body { margin: 0; font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg-color); color: var(--text-main); transition: 0.4s; overflow-x: hidden; }

/* --- Like Button Style --- */
.like-btn {
    position: absolute; top: 10px; right: 10px;
    background: white; border: none; border-radius: 50%;
    width: 35px; height: 35px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; transition: 0.3s; z-index: 10;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    color: #cbd5e1; /* Default Grey */
}
.like-btn.active { color: #ff6f91 !important; transform: scale(1.2); }
.like-btn:hover { transform: scale(1.1); box-shadow: 0 4px 12px var(--glow); }

/* --- ANIMATION: RADHE RADHE GLOW --- */
#special-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: #050505; display: none; z-index: 9999;
    justify-content: center; align-items: center; overflow: hidden; pointer-events: none;
}
.glow-text {
    position: absolute; font-size: 38px; font-weight: 900; opacity: 0; animation: swirlFade 4s forwards;
}
@keyframes swirlFade {
    0% { opacity: 0; transform: scale(0.2) rotate(-20deg); }
    30% { opacity: 1; transform: scale(1.1) rotate(0deg); }
    100% { opacity: 0; transform: scale(1.8) rotate(20deg); }
}

/* --- ANIMATION: LOVE GLOW --- */
#love-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: #ffb6c1; display: none; z-index: 9999;
    justify-content: center; align-items: center; overflow: hidden; pointer-events: none;
}
.love-emoji {
    position: absolute; font-size: 45px; opacity: 0; top: 50%; left: 50%;
    animation: scatterLove 7s forwards ease-out; 
}
@keyframes scatterLove {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.1); }
    10% { opacity: 1; transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(1.5) rotate(var(--rot)); }
    85% { opacity: 1; transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(1.5) rotate(var(--rot)); }
    100% { opacity: 0; transform: translate(calc(-50% + var(--tx) * 1.2), calc(-50% + var(--ty) * 1.2)) scale(2) rotate(var(--rot)); }
}

/* --- Layout Styles --- */
header { background: var(--header-bg); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 12px var(--shadow); position: sticky; top: 0; z-index: 1000; }
.logo { font-size: 28px; font-weight: 800; color: var(--accent-pink); }

.nav-links a { 
    text-decoration: none; color: white; background-color: var(--accent-pink); 
    padding: 10px 22px; border-radius: 50px; font-weight: bold; margin-left: 15px; 
    cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 10px var(--glow);
    display: inline-block;
}
.nav-links a:hover { transform: translateY(-2px); box-shadow: 0 6px 15px var(--glow); }

.hero { text-align: center; padding: 60px 20px; background: var(--hero-grad); }
.brand-name { color: var(--accent-pink); }

.search-container { max-width: 650px; margin: 30px auto 0; position: relative; }
.search-box { display: flex; background: var(--card-bg); padding: 6px; border-radius: 50px; border: 1px solid var(--border-color); box-shadow: 0 0 15px var(--glow); transition: 0.3s; }
.search-box input { flex: 1; padding: 12px 20px; border: none; background: transparent; color: var(--text-main); font-size: 18px; outline: none; }
.search-box button { padding: 0 35px; border: none; background: var(--accent-pink); color: white; border-radius: 50px; cursor: pointer; }

.hidden { display: none !important; }
.section-title { text-align: center; margin: 40px 0 30px; font-size: 32px; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; padding: 0 5%; }

/* Uniform Cards */
.card { position: relative; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 20px; padding: 15px; transition: 0.4s; cursor: pointer; }
.card:hover { transform: translateY(-8px); border-color: var(--accent-pink); }
.card .img-wrapper { width: 100%; height: 200px; overflow: hidden; border-radius: 12px; background: #eee; }
.card img { width: 100%; height: 100%; object-fit: cover; }

/* Instruction View */
.step-view-container { background: var(--card-bg); margin: 20px 5%; padding: 40px; border-radius: 30px; text-align: center; position: relative;}
.main-img { max-width: 450px; width: 100%; border-radius: 20px; border: 3px solid var(--accent-pink); margin-bottom: 20px; }
.steps-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 30px; }
.step-card { background: var(--bg-color); padding: 15px; border-radius: 15px; border: 1px solid var(--border-color); text-align: left; }
.step-card img { width: 100%; height: 160px; object-fit: cover; border-radius: 10px; margin-bottom: 12px; }

.back-btn { background: var(--accent-pink); color: white; border: none; padding: 12px 35px; border-radius: 50px; cursor: pointer; font-weight: bold; margin-top: 30px; }

footer { text-align: center; padding: 40px; border-top: 1px solid var(--border-color); color: var(--text-sub); }
</style>
</head>

<body data-theme="light">

<div id="special-overlay"></div>
<div id="love-overlay"></div>

<header>
    <div class="logo">Craftopedia</div>
    <nav class="nav-links">
        <a onclick="showView('home')">Home</a>
        <a href="trending.html">Trending</a>
        <a href="profile.html">Profile</a>
    </nav>
    <button onclick="toggleTheme()" style="padding: 8px 15px; border-radius: 50px; cursor: pointer; background: var(--card-bg); color: var(--text-main); border: 1px solid var(--border-color);">🌙 Theme</button>
</header>

<section class="hero">
    <h1>Create with <span class="brand-name">Craftopedia</span></h1>
    <div class="search-container">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search (Rose, Draw)...">
            <button id="searchBtn">🔍</button>
        </div>
        <div id="search-feedback" style="margin-top:10px; font-weight:bold;"></div>
    </div>
</section>

<div id="home-view">
    <h2 class="section-title">Explore Categories</h2>
    <div class="grid">
        <div class="card" id="paper-cat-btn">
            <div class="img-wrapper"><img src="paper.jpg"></div>
            <h3>PAPER CRAFTS</h3>
        </div>
        <div class="card" id="diy-cat-btn">
            <div class="img-wrapper"><img src="diy.jpg"></div>
            <h3>DIY PROJECTS</h3>
        </div>
        <div class="card" id="drawing-cat-btn">
            <div class="img-wrapper"><img src="painting.jpg"></div>
            <h3>PAINTING & DRAWING</h3>
        </div>
    </div>
</div>

<div id="radha-view" class="hidden">
    <h2 class="section-title" style="color:#FFD700">Divine Presence</h2>
    <img src="Radha.jpeg" class="radha-img">
    <div class="radha-desc">Radha is the embodiment of spiritual love...</div>
    <button class="back-btn" onclick="showView('home')">Back to Home</button>
</div>

<div id="love-view" class="hidden">
    <h2 class="section-title" style="color:var(--accent-pink)">Sending Love!</h2>
    <img src="hup hup.webp" class="love-img"><br>
    <button class="back-btn" onclick="showView('home')">Back to Home</button>
</div>

<div id="category-view" class="hidden">
    <h2 id="cat-title" class="section-title"></h2>
    <div id="cat-grid" class="grid"></div>
    <div style="text-align:center;"><button class="back-btn" onclick="showView('home')">Back to Home</button></div>
</div>

<div id="step-view" class="hidden">
    <div class="step-view-container">
        <button id="main-like-btn" class="like-btn"><i class="fa-solid fa-heart"></i></button>
        <h2 id="step-title" class="section-title"></h2>
        <img id="step-main-img" class="main-img" src="">
        <h3 class="section-title">Instructions</h3>
        <div id="step-cards-container" class="steps-grid"></div>
        <button class="back-btn" id="step-back-btn">Go Back</button>
    </div>
</div>

<footer><p>© 2026 Craftopedia | Elevate Your Creativity</p></footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBkerGAYmcUC9YF1V9rk-3Ex_ropIlLUS8",
        authDomain: "craftopedia-d611d.firebaseapp.com",
        projectId: "craftopedia-d611d",
        storageBucket: "craftopedia-d611d.firebasestorage.app",
        messagingSenderId: "1092964176836",
        appId: "1:1092964176836:web:d82013865be5fe00bd8a91",
        measurementId: "G-LRK408VGVW"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // --- STATIC DATA ---
    const paperCraftsLibrary = [
        { id: "rose", title: "Handmade Rose", img: "rose.jpg", keywords: ["rose", "flower"], steps: [{img: "step1.jpeg", text: "Step 1: Cut..."},{img: "step2.jpeg", text: "Step 2: Fold..."},{img: "step3.jpeg", text: "Step 3: Glue..."}] },
        { id: "snowman", title: "Snowman", img: "Snowman.jpeg", keywords: ["snowman"], steps: [{img: "Snowman Step1.jpg", text: "Step 1..."}] }
        // ... (Keep your full libraries here, I shortened for space)
    ];
    const drawingCraftsLibrary = [{ id: "sketch_pencil", title: "Pencil Drawing", img: "drawing.jpeg", keywords: ["sketch"], steps: [] }];
    const diyCraftsLibrary = [{ id: "diy1", title: "Bottle Art", img: "bottle.jpg", keywords: ["bottle"], steps: [] }];

    let lastView = 'home';

    // --- UI LOGIC ---
    window.showView = (viewId) => {
        ['home', 'category', 'step', 'radha', 'love'].forEach(v => document.getElementById(v + '-view')?.classList.add('hidden'));
        document.getElementById(viewId + '-view')?.classList.remove('hidden');
    };

    window.toggleTheme = () => {
        document.body.setAttribute('data-theme', document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    };

    const renderSteps = (craft) => {
        document.getElementById('step-title').innerText = craft.title;
        document.getElementById('step-main-img').src = craft.img;
        const mainLike = document.getElementById('main-like-btn');
        
        mainLike.onclick = (e) => {
            e.stopPropagation();
            toggleLike(craft.id, craft.title, craft.img, mainLike);
        };
        checkIfLiked(craft.id, mainLike);

        const container = document.getElementById('step-cards-container');
        container.innerHTML = craft.steps.map((s, i) => `<div class="step-card"><img src="${s.img}"><h4>Step ${i+1}</h4><p>${s.text}</p></div>`).join('');
        showView('step');
    };

    const openCategory = (catKey) => {
        lastView = 'home';
        let data = catKey === 'paper' ? paperCraftsLibrary : catKey === 'drawing' ? drawingCraftsLibrary : diyCraftsLibrary;
        document.getElementById('cat-title').innerText = catKey.toUpperCase() + " GALLERY";
        const grid = document.getElementById('cat-grid');
        
        grid.innerHTML = data.map(item => `
            <div class="card" id="card-${item.id}">
                <button class="like-btn" id="like-${item.id}"><i class="fa-solid fa-heart"></i></button>
                <div class="img-wrapper"><img src="${item.img}"></div><h3>${item.title}</h3>
            </div>`).join('');

        data.forEach(item => {
            const btn = document.getElementById(`like-${item.id}`);
            btn.onclick = (e) => { e.stopPropagation(); toggleLike(item.id, item.title, item.img, btn); };
            document.getElementById(`card-${item.id}`).onclick = () => { lastView = 'category'; renderSteps(item); };
            checkIfLiked(item.id, btn);
        });
        showView('category');
    };

    // --- LIKE LOGIC ---
    const toggleLike = async (id, title, img, btnElement) => {
        const user = auth.currentUser;
        if (!user) return;
        const likeRef = doc(db, "users", user.uid, "likes", id);
        const docSnap = await getDoc(likeRef);
        if (docSnap.exists()) {
            await deleteDoc(likeRef);
            btnElement.classList.remove('active');
        } else {
            await setDoc(likeRef, { id, title, img, timestamp: Date.now() });
            btnElement.classList.add('active');
        }
    };

    const checkIfLiked = async (id, btnElement) => {
        if (!auth.currentUser || !btnElement) return;
        const docSnap = await getDoc(doc(db, "users", auth.currentUser.uid, "likes", id));
        if (docSnap.exists()) btnElement.classList.add('active');
    };

    // --- INITIALIZATION ---
    onAuthStateChanged(auth, (user) => {
        if (!user) window.location.href = "login.html";
    });

    // Event Listeners for Buttons
    document.getElementById('paper-cat-btn').onclick = () => openCategory('paper');
    document.getElementById('diy-cat-btn').onclick = () => openCategory('diy');
    document.getElementById('drawing-cat-btn').onclick = () => openCategory('drawing');
    document.getElementById('step-back-btn').onclick = () => showView(lastView);
    document.getElementById('searchBtn').onclick = () => { /* Add search logic if needed */ };
</script>
</body>
</html>
