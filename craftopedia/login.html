<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Craftopedia | Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; height: 100vh; font-family: Arial, sans-serif; background: linear-gradient(135deg, #fbc2eb, #a6c1ee); display: flex; justify-content: center; align-items: center; }
        .card { background: #ffffff; width: 380px; padding: 30px; border-radius: 18px; box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2); text-align: center; }
        .logo-img { width: 220px; margin-bottom: 10px; }
        h2 { margin-bottom: 20px; color: #444; }
        .input-box { position: relative; width: 100%; margin: 14px 0; }
        .input-box i { position: absolute; top: 50%; left: 14px; transform: translateY(-50%); color: #888; }
        .input-box input { width: 100%; padding: 12px 12px 12px 42px; border-radius: 10px; border: 1px solid #ccc; font-size: 15px; outline: none; }
        .btn { width: 100%; margin-top: 18px; padding: 12px; font-size: 18px; border: none; border-radius: 12px; background: linear-gradient(135deg, #ff5e62, #ff9966); color: white; cursor: pointer; }
        .btn:hover { opacity: 0.9; }
        .extra-links { margin-top: 15px; font-size: 14px; }
        .extra-links a { color: #ff5e62; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <img src="craftopedia-text.jpeg" alt="Craftopedia Logo" class="logo-img">
        <h2>Login</h2>
        <form action="ak.html">
            <div class="input-box">
                <i class="fa fa-user"></i>
                <input type="text" placeholder="User ID / Email" required>
            </div>
            <div class="input-box">
                <i class="fa fa-lock"></i>
                <input type="password" placeholder="Password" required>
            </div>
            <button class="btn" type="submit">Login</button>
        </form>
        <div class="extra-links">No account? <a href="index.html">Register</a> | <a href="#">Forgot Password?</a></div>
    </div>
</body>
</html>
