<script type = "module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, updateProfile, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    import { getFirestore, collection, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBkerGAYmcUC9YF1V9rk-3Ex_ropIlLUS8",
        authDomain: "craftopedia-d611d.firebaseapp.com",
        projectId: "craftopedia-d611d",
        storageBucket: "craftopedia-d611d.firebasestorage.app",
        messagingSenderId: "1092964176836",
        appId: "1:1092964176836:web:d82013865be5fe00bd8a91",
        measurementId: "G-LRK408VGVW"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // --- LIBRARIES (Unchanged) ---
    const paperCraftsLibrary = [
        { id: "rose", title: "Handmade Rose", img: "rose.jpg", steps: [{img: "step1.jpeg", text: "Step 1: Cut colour paper into equal square pieces."},{img: "step2.jpeg", text: "Step 2: Fold the paper to create petal shape."},{img: "step3.jpeg", text: "Step 3: Glue all petals together and attach a stem."}] },
        { id: "snowman", title: "Snowman", img: "Snowman.jpeg", steps: [{img: "Snowman Step1.jpg", text: "Step 1: Take red and white colour paper."},{img: "Snowman Step2.jpg", text: "Step 2: Cut 2 white paper strips and fold in circle shape."},{img: "Snowman Step3.jpg", text: "Step 3: Cut a red semicircle for cap and stick white strip on top."},{img: "Snowman Step4.jpg", text: "Step 4: Add eyes, nose, smile, cheeks and buttons."},{img: "Snowman Step5.jpg", text: "Step 5: Stick small dry sticks on both sides."}] },
        { id: "fish", title: "Fish", img: "Fish.jpeg", steps: [{img: "Fish1.jpg", text: "Step 1: Take rectangle shaped colour paper."},{img: "Fish2.jpg", text: "Step 2: Fold like a fan (Zig-Zag fold)."},{img: "Fish3.jpg", text: "Step 3: Fold the fan into half and glue both sides."},{img: "Fish4.jpg", text: "Step 4: Cut triangle for tail and stick googly eyes."}] },
        { id: "tree", title: "Tree", img: "Tree.jpg", steps: [{img: "Tree1.jpg", text: "Step 1: Take green colour paper."},{img: "Tree2.jpg", text: "Step 2: Cut different curved shapes and paste bottom to top."},{img: "Tree3.jpg", text: "Step 3: Paste a yellow star on top."},{img: "Tree4.jpg", text: "Step 4: Decorate with pom-poms and white dots."}] },
        { id: "crown", title: "Crown", img: "Crown.jpeg", steps: [{img: "Crown1.jpg", text: "Step 1: Cut crown shape from paper."},{img: "Crown2.jpg", text: "Step 2: Stick golden tape or paper."},{img: "Crown3.jpg", text: "Step 3: Add decorative beads."},{img: "Crown4.jpg", text: "Step 4: Stick beads properly."}] },
        { id: "icecream", title: "Ice Cream", img: "I.jpg", steps: [{img: "I1.jpg", text: "Step 1: Cut cone shape from paper."},{img: "I2.jpg", text: "Step 2: Roll and stick into cone shape."},{img: "I3.jpg", text: "Step 3: Cut fruit shapes and glue on top."},{img: "I4.jpg", text: "Step 4: Insert fruit and straw."}] },
        { id: "giftbox", title: "Pyramid Gift Box", img: "Gift box.jpg", steps: [{img: "G1.jpg", text: "Step 1: Take square paper."},{img: "G2.jpg", text: "Step 2: Draw fold lines."},{img: "G3.jpg", text: "Step 3: Cut along lines."},{img: "G4.jpg", text: "Step 4: Fold properly."},{img: "G5.jpg", text: "Step 5: Apply glue."},{img: "G6.jpg", text: "Step 6: Stick flaps together."},{img: "G7.jpg", text: "Step 7: Punch holes at top."},{img: "G8.jpg", text: "Step 8: Insert ribbon and tie."}] }
    ];
    const drawingCraftsLibrary = [
        { id: "sketch_pencil", title: "Pencil Drawing", img: "drawing.jpeg", steps: [{img: "drawing.jpeg", text: "Follow the reference image to practice your shading."}] },
        { id: "sketch_pooh", title: "Pooh Drawing", img: "Pooh.jpg", steps: [{img: "Pooh.jpg", text: "Sketch lightly first, then darken the main outlines of the bear."}] },
        { id: "sketch_mickey", title: "Mickey Mouse Drawing", img: "Mickey mouse.jpg", steps: [{img: "Mickey mouse.jpg", text: "Start with circles for the head and ears before adding facial details."}] },
        { id: "sketch_flower", title: "Flower painting", img: "Flower.jpg", steps: [{img: "Flower.jpg", text: "Use bright colors to paint the petals and blend carefully."}] },
        { id: "sketch_village", title: "Green Village House Drawing", img: " V.jpg", steps: [{img: " V.jpg", text: "Draw the background scenery first, then detail the village house."}] }
    ];
    const diyCraftsLibrary = [
        { id: "diy1", title: "Bottle Art", img: "bottle.jpg", steps: [{img: "b1.jpg", text: "Clean..."},{img: "b2.jpg", text: "Paint..."},{img: "b3.jpg", text: "Varnish..."}] },
        { id: "diy2", title: "Popsicle Sticks House", img: "S.jpeg", steps: [{ img: "S1.jpeg", text: "Arrange ice cream sticks side by side." },{ img: "S2.jpeg", text: "Build triangle roof support." },{ img: "S3.jpeg", text: "Cut entrance hole." },{ img: "S4.jpeg", text: "Paint and dry." }] },
        { id: "diy3", title: "Paper Cup House", img: "H.jpeg", steps: [{ img: "H1.jpg", text: "Get materials." },{ img: "H2.jpg", text: "Make cone roof." },{ img: "H3.jpg", text: "Draw details." },{ img: "H4.jpg", text: "Stick roof." }] }
    ];

    const allCrafts = [...paperCraftsLibrary, ...drawingCraftsLibrary, ...diyCraftsLibrary];

    const nameText = document.getElementById('display-name');
    const nameInput = document.getElementById('name-input');
    const emailText = document.getElementById('user-email');
    const initialCircle = document.getElementById('user-initial');
    const staticGrid = document.getElementById('static-grid');
    const videoGrid = document.getElementById('video-grid');
    let isEditing = false;

    // --- THE LOADING LOGIC ---
    onAuthStateChanged(auth, (user) => {
        if (user) {
            nameText.innerText = user.displayName || "Art Lover";
            emailText.innerText = user.email;
            initialCircle.innerText = (user.displayName || "A").charAt(0).toUpperCase();
            document.getElementById('welcome-header').innerText = `Hi, ${user.displayName || "Art Lover"}!`;

            // Using the 'likes' collection for everything
            const likesRef = collection(db, "users", user.uid, "likes");
            
            onSnapshot(likesRef, (snapshot) => {
                staticGrid.innerHTML = '';
                videoGrid.innerHTML = '';
                
                if (snapshot.empty) {
                    staticGrid.innerHTML = `<div class="empty-state">No static projects saved yet.</div>`;
                    videoGrid.innerHTML = `<div class="empty-state">No videos liked yet.</div>`;
                    return;
                }

                let hasStatic = false;
                let hasVideo = false;

                snapshot.docs.forEach(docSnap => {
                    const item = docSnap.data();
                    const isVideo = item.type === 'video';
                    
                    // The template literal (backticks) starts here:
                    const cardHTML = `
                        <div class="liked-card" onclick="window.openCraft('${item.id}', '${item.type || 'craft'}')">
                            ${isVideo ? '<div class="play-overlay">▶</div>' : ''}
                            <img src="${item.img}" onerror="this.src='https://placehold.co/300x200?text=Craft'">
                            <div class="liked-info">
                                <h3>${item.title}</h3>
                                <button class="btn-remove" onclick="event.stopPropagation(); window.removeLike('${docSnap.id}')">
                                    <i class="fa-solid fa-trash"></i> Remove
                                </button>
                            </div>
                        </div>
                    `;

                    if (isVideo) {
                        hasVideo = true;
                        videoGrid.innerHTML += cardHTML;
                    } else {
                        hasStatic = true;
                        staticGrid.innerHTML += cardHTML;
                    }
                });

                if (!hasStatic) staticGrid.innerHTML = `<div class="empty-state">No projects saved yet.</div>`;
                if (!hasVideo) videoGrid.innerHTML = `<div class="empty-state">No videos liked yet.</div>`;
            });
        } else {
            window.location.href = "login.html";
        }
    });

    // --- GLOBAL FUNCTIONS ---
    window.openCraft = (id, type) => {
        if (type === 'video') {
            window.open(`https://www.youtube.com/watch?v=${id}`, '_blank');
            return;
        }
        const craft = allCrafts.find(c => c.id === id);
        if (craft) {
            document.getElementById('step-title').innerText = craft.title;
            document.getElementById('step-main-img').src = craft.img;
            const container = document.getElementById('step-cards-container');
            container.innerHTML = craft.steps ? craft.steps.map((s, i) => `
                <div class="step-card">
                    <img src="${s.img}" onerror="this.src='https://placehold.co/300x200?text=Step+${i+1}'">
                    <h4>Step ${i+1}</h4><p>${s.text}</p>
                </div>
            `).join('') : '<p>Instructions coming soon!</p>';
            document.getElementById('profile-main-view').classList.add('hidden');
            document.getElementById('step-view').classList.remove('hidden');
            window.scrollTo(0, 0);
        }
    };

    window.showProfile = () => {
        document.getElementById('step-view').classList.add('hidden');
        document.getElementById('profile-main-view').classList.remove('hidden');
    };

    window.toggleEdit = async () => {
        if (!isEditing) {
            nameText.style.display = 'none';
            nameInput.style.display = 'block';
            document.getElementById('edit-btn').innerText = "Save Changes";
            isEditing = true;
        } else {
            const newName = nameInput.value.trim();
            if (newName && auth.currentUser) {
                await updateProfile(auth.currentUser, { displayName: newName });
                location.reload(); 
            }
            isEditing = false;
        }
    };

    window.removeLike = async (docId) => {
        if(confirm("Remove this item from your collection?")) {
            const user = auth.currentUser;
            if (user) {
                await deleteDoc(doc(db, "users", user.uid, "likes", docId));
            }
        }
    };

    window.handleLogout = () => signOut(auth).then(() => window.location.href = "login.html");
