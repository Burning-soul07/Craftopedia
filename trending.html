<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Craftopedia | Your Aesthetic Art Engine</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <link rel="stylesheet" href="styles.css">

    <style>
        .top-back-btn {
            position: fixed; 
            top: 20px;
            left: 20px;
            background-color: #ff6f91; /* Signature pink */
            color: white;
            padding: 10px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-family: 'Poppins', sans-serif;
            box-shadow: 0 4px 12px rgba(255, 111, 145, 0.4);
            transition: all 0.3s ease;
            z-index: 9999; 
            border: 2px solid transparent;
        }

        .top-back-btn:hover {
            background-color: #ff4d79; 
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(255, 111, 145, 0.6);
        }

        /* --- THE INDESTRUCTIBLE LIKE BUTTON CSS --- */
        .like-btn {
            position: absolute !important;
            top: 15px !important;
            right: 15px !important;
            z-index: 1000 !important; 
            background: white !important;
            border: none !important;
            border-radius: 50% !important;
            width: 40px !important;
            height: 40px !important;
            cursor: pointer !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3) !important;
            transition: transform 0.2s ease;
        }
        .like-btn.active { 
    transform: scale(1.2); 
}
        .like-btn i { color: #cbd5e1; font-size: 20px; pointer-events: none; }
        .like-btn.active i { 
    color: #ff6f91 !important; 
}

        .watch-actions {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <section id="watch-section" class="hidden">
        <div class="watch-container">
            <div class="main-player">
                <div class="iframe-container">
                    <iframe 
                        id="youtube-player" 
                        src="" 
                        frameborder="0" 
                        allow="autoplay; encrypted-media" 
                        referrerpolicy="strict-origin-when-cross-origin" 
                        allowfullscreen>
                    </iframe>
                </div>
                <h2 id="now-playing-title">Video Title</h2>
                <div class="watch-actions">
                    <button id="close-watch" class="home-btn">🏠 Back to Home Gallery</button>
                    <button id="watch-like-btn" class="like-btn" style="position: relative !important; top: 0 !important; right: 0 !important;">
                        <i class="fa-solid fa-heart"></i>
                    </button>
                </div>
            </div>

            <div class="side-feed">
                <h3>More Crafts to Explore</h3>
                <div id="side-gallery"></div>
            </div>
        </div>
    </section>

    <section id="gallery-section">
        <a href="ak.html" class="top-back-btn">⬅ Home</a>

        <header id="main-header">
            <div id="paper-plane-container">✈️</div> 
            <h1>Craftopedia</h1>
            <p>Explore the best craft tutorials.</p>
            
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Search for origami, clay, painting...">
                <button id="search-btn">Search</button>
            </div>
        </header>

        <main>
            <div id="video-gallery" class="gallery-grid"></div>
        </main>
    </section>

    <script src="script.js?v=4"></script>

    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBkerGAYmcUC9YF1V9rk-3Ex_ropIlLUS8",
        authDomain: "craftopedia-d611d.firebaseapp.com",
        projectId: "craftopedia-d611d",
        storageBucket: "craftopedia-d611d.firebasestorage.app",
        messagingSenderId: "1092964176836",
        appId: "1:1092964176836:web:d82013865be5fe00bd8a91"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // --- THE FIX: GLOBAL LIKE FUNCTION ---
    window.toggleLike = async (id, title, img, btnElement) => {
        // 1. Check if user is logged in
        const user = auth.currentUser;
        if (!user) {
            alert("You need to be logged in to save videos! Go to the Home page to Login.");
            return;
        }

      const likeRef = doc(db, "users", user.uid, "likes", id);
        
        try {
            const docSnap = await getDoc(likeRef);
            
            if (docSnap.exists()) {
                // Already liked? Remove it.
                await deleteDoc(likeRef);
                btnElement.classList.remove('active');
                console.log("Unliked:", title);
            } else {
                // Not liked? Save it to Firestore.
                await setDoc(likeRef, {
                    title: title,
                    img: img,
                    type: 'video', // This identifies it as a YouTube video in your Profile
                    videoId: id,
                    timestamp: Date.now()
                });
                btnElement.classList.add('active');
                console.log("Saved to Profile:", title);
            }
        } catch (err) {
            console.error("Firebase Error:", err);
            alert("Could not save. Check your internet or Firebase permissions.");
        }
    };

    // This checks if the video was already liked when the page loads
    window.checkIfLiked = async (id, btnElement) => {
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const likeRef = doc(db, "users", user.uid, "likedCrafts", id);
                const docSnap = await getDoc(likeRef);
                if (docSnap.exists()) {
                    btnElement.classList.add('active');
                }
            }
        });
    };
</script>
</body>
</html>
